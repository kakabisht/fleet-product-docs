name: Test Sync Action
on:
  push:
    branches:
      - test-main
    paths:
      - 'community-docs/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Sync Files
        run: |
          # 1. Store files from the current branch (test-main)
          mkdir -p /tmp/sync-staging
          cp -r community-docs/* /tmp/sync-staging/
          
          # 2. Force the runner to find the target branch
          git fetch origin test-product-docs-1:test-product-docs-1
          
          # 3. Switch to the target branch
          git checkout test-product-docs-1
          
          # 4. Inject files and check status
          cp -r /tmp/sync-staging/* ./
          git status # This will show in logs if files actually changed
          
          rm -rf /tmp/sync-staging

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: test-product-docs-1
          branch: automated-sync-test
          title: "Test: Syncing community-docs to product-docs"
          body: "This PR was triggered by a merge into test-main."
          commit-message: "test: sync files from test-main"
          delete-branch: true