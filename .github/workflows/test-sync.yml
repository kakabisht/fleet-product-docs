name: Test Sync Action
on:
  push:
    branches:
      - test-main
    paths:
      - 'community-docs/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Sync Files (Changed files)
        run: |
          # 1. Identify files changed in this push/merge inside the community-docs folder
          # This looks at the difference between the current commit and its parent
          CHANGES=$(git diff --name-only HEAD^ HEAD | grep '^community-docs/' || true)
          
          if [ -z "$CHANGES" ]; then
            echo "No changes detected in community-docs/. Skipping sync."
            exit 0
          fi

          echo "Files to sync: $CHANGES"

          # 2. Stage ONLY the changed files
          mkdir -p /tmp/sync-staging
          for file in $CHANGES; do
            # This extracts the relative path and copies it
            # e.g., community-docs/sub/file.adoc -> /tmp/sync-staging/sub/file.adoc
            dest_dir="/tmp/sync-staging/$(dirname "${file#community-docs/}")"
            mkdir -p "$dest_dir"
            cp "$file" "$dest_dir/"
          done
          
          # 3. Switch to target branch
          git fetch origin test-product-docs-1:test-product-docs-1
          git checkout test-product-docs-1
          
          # 4. Inject only the surgical changes
          cp -r /tmp/sync-staging/* ./
          rm -rf /tmp/sync-staging

          # Show what Git actually sees as a change now
          git status
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: test-product-docs-1
          branch: automated-sync-test
          title: "Test: Syncing community-docs to product-docs"
          body: "This PR was triggered by a merge into test-main."
          commit-message: "test: sync files from test-main"
          delete-branch: true